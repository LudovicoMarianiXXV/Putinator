<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport">
  <title>Gioco - Putinator</title>
  <script src="../json/characters.js"></script>
  <script src="../json/questions.js"></script>
  <script src="../js/script.js"></script>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body{
      height: 100vh;
      background-repeat: no-repeat;
    }
   
  </style>
</head>
<body>
  <!-- Barra degli strumenti -->
  <div class="barra">
    <button class="barra-home" onclick="goHome2()">HOME</button>
    <h1 class="barra-title">Putinator</h1>
    <div class="barra-right">
      <span class="barra-steam">STEAM</span>
      <span class="barra-who">WHO?</span>
    </div>
  </div>

  <div class="game-container">
    <!-- Div per la domanda -->
    <div id="question" class="question">Caricamento...</div>
    
    <!-- Bottoni per le risposte -->
    <div class="answer-buttons">
      <button id="yes">Sì</button>
      <button id="no">No</button>
    </div>

    <!-- Pulsante "Non lo so" sotto -->
    <div class="answer-buttons">
      <button id="dontKnow">Non lo so</button>
    </div>

    <!-- Risultato -->
    <div id="result"></div>
</div>
  

</body>
</html>
